<!DOCTYPE html>
<html>
  <head>
    <title>Albatross Official - 404 Page not Found</title>
    <link rel="icon" href="icon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <style>
      * {
        font-family: Montserrat;
        text-align: center;
      }
      body {
        background: #2f2f2f;
        color: #f2f2f2;
      }
      h5 {
        color: #2f2f2f;
      }
      h5:hover {
        pointer-events: none;
        color: #2f2f2f;
      }
      .headtitle {
  color: rgb(255, 255, 255); 
  text-decoration: none;
}
      h3 {
        font-weight: 15;
      }
      button {
        color: #f3f3f3;
        background: #3f3f3f;
        border: none;
        border-radius: 2.5px;
        padding: 10px;
        transition: 0.25s;
      }
      button:hover {
        cursor: pointer;
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <h2>Page not Found</h2>
    <p>&nbsp;</p>
    <p>If you think this is a mistake, please click the "Report" button below.</p><br>
    <button onclick="mistake404()">Report</button>
    <script>
      let url = window.location.href;
      function mistake404() {
        const webhook ="https://discord.com/api/webhooks/1194691163924476064/U0S_7TPBSaYCw_9uv_afkYaKrSZYkcQLabF0Es7lsIsyg1NI-aGE9-KPUcpSwe4ZEp_D"; //Don't use this to spam, please.
      
        const contents = `- A 404 error has been reported with this url:\n- ${url}`;
        const request = new XMLHttpRequest();
        request.open("POST", webhook);
        request.setRequestHeader('Content-type', 'application/json');
        const params = {
            username: 'Error 404 Report',
            content: contents
        }
        request.send(JSON.stringify(params));
        alert("Report sent!");
      }
    </script>
    <h5>Credits to TomMustBe12 for original 404 page.</h5>
  </body>
</html>
